server:
  port: 8924

spring:
  application:
    name: example-learning-module
  datasource:
    url: jdbc:h2:mem:exampledb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
